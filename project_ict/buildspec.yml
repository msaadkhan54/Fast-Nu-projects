version: 0.2

phases:

  pre_build:

    commands:

      - echo Logging in to Amazon ECR...

      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 678878256416.dkr.ecr.us-east-1.amazonaws.com

  build:

    commands:

      - echo Building Docker image...

      - docker build -t my-nginx .

      - docker tag my-nginx:latest 678878256416.dkr.ecr.us-east-1.amazonaws.com/prac_repo:latest

  post_build:

    commands:

      - echo Pushing Docker image...

      - docker push 678878256416.dkr.ecr.us-east-1.amazonaws.com/prac_repo:latest

      - echo Build completed